data:
  # ── Data Source ────────────────────────────────────────
  # Options: "csv" | "yfinance" | "binance"
  source: "csv"

  timeframe:     "1d"
  lookback_days: 365
  train_split:   0.8
  symbol:        "GOLD"

  # ── CSV (used when source: "csv") ─────────────────────
  csv_path: "data/gold_clean_data/XAU_1d_data_clean.csv"

  # ── yfinance (used when source: "yfinance") ───────────
  yfinance_ticker: "GC=F"

  # ── Binance (used when source: "binance") ─────────────
  # symbol above is reused (e.g. "BTCUSDT", "ETHUSDT")


indicators:
  ema_periods:
    - 20
    - 50
    - 200
  rsi_periods:
    - 7
    - 14
  macd:
    fast:   12
    slow:   26
    signal: 9
  bollinger:
    period:  20
    std_dev: 2
  atr_period: 14


ai:
  algorithm:            "PPO"
  training_timesteps:   1000000   # doubled: more training = better policy
  learning_rate:        0.0002    # slightly lower: more stable convergence
  model_save_path:      "models/"
  confidence_threshold: 60.0     # raised: only act on high-confidence signals
  training_runs:        5         # more runs = better chance of finding good policy


broker:
  mode:            "paper"
  initial_capital: 10000
  symbol:          "BTCUSDT"


risk:
  position_sizing:    "kelly"
  max_position_pct:   0.95
  min_position_pct:   0.01
  kelly_fraction:     0.25
  fixed_dollar_risk:  20
  stop_loss_pct:      0.012    # tighter stop: cut losses faster
  take_profit_pct:    0.05     # wider target: let winners run more
  trailing_stop:      true     # lock in profits on strong moves
  trailing_pct:       0.05     # trail by 5% from peak
  max_daily_loss_pct: 0.03
  max_drawdown_pct:   0.15
  max_open_trades:    1


scheduler:
  run_hour:   9
  run_minute: 0